name: Apply English translation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  translate:
    if: github.head_ref == 'agent/apply-english-translation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Run translation and retain complete diagnostics
        shell: bash
        run: |
          set +e
          python scripts/translate_chinese_to_english.py > TRANSLATION_LOG.txt 2>&1
          translation_status=$?
          echo "TRANSLATION_EXIT_STATUS=$translation_status" >> TRANSLATION_LOG.txt
          python -m compileall -q . >> TRANSLATION_LOG.txt 2>&1
          compile_status=$?
          echo "COMPILE_EXIT_STATUS=$compile_status" >> TRANSLATION_LOG.txt
          if [ -f CHINESE_SCAN.txt ]; then
            tail -n 20 CHINESE_SCAN.txt >> TRANSLATION_LOG.txt
          fi
          exit 0
      - name: Commit partial results and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record English translation diagnostics [skip ci]" || exit 0
          git push
