name: Apply English translation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  translate:
    if: github.head_ref == 'agent/apply-english-translation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Run deterministic translation and cleanup
        shell: bash
        run: |
          set +e
          : > TRANSLATION_LOG.txt
          python scripts/translate_chinese_to_english.py >> TRANSLATION_LOG.txt 2>&1
          echo "PRIMARY_TRANSLATION_EXIT_STATUS=$?" >> TRANSLATION_LOG.txt
          python scripts/fix_remaining_chinese.py >> TRANSLATION_LOG.txt 2>&1
          echo "CLEANUP_TRANSLATION_EXIT_STATUS=$?" >> TRANSLATION_LOG.txt
          python -m compileall -q . >> TRANSLATION_LOG.txt 2>&1
          echo "COMPILE_EXIT_STATUS=$?" >> TRANSLATION_LOG.txt
          if [ -f CHINESE_SCAN.txt ]; then
            cat CHINESE_SCAN.txt >> TRANSLATION_LOG.txt
          fi
          exit 0
      - name: Commit translated files and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete deterministic English translation [skip ci]" || exit 0
          git push
