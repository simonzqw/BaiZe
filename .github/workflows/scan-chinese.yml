name: Finalize English translation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/finalize-english-translation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Fix remaining translated fragments
        run: python scripts/fix_remaining_chinese.py
      - name: Verify no Chinese text remains
        run: grep -Fxq 'TOTAL_MATCHING_LINES=0' CHINESE_SCAN.txt
      - name: Validate Python syntax
        run: python -m compileall -q .
      - name: Remove temporary translation infrastructure
        run: |
          rm -f CHINESE_SCAN.txt
          rm -f TRANSLATION_LOG.txt
          rm -f scripts/translate_chinese_to_english.py
          rm -f scripts/fix_remaining_chinese.py
          rm -f .github/workflows/scan-chinese.yml
      - name: Commit final English-only repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize English-only repository content [skip ci]"
          git push
