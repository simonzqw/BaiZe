name: Translate repository to English

on:
  push:
    branches: [agent/translate-chinese-to-english]

permissions:
  contents: write

jobs:
  translate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/translate-chinese-to-english
          fetch-depth: 0
      - name: Run translation and retain diagnostics
        shell: bash
        run: |
          set +e
          python scripts/translate_chinese_to_english.py > TRANSLATION_LOG.txt 2>&1
          status=$?
          echo "TRANSLATION_EXIT_STATUS=$status" >> TRANSLATION_LOG.txt
          python -m compileall -q . >> TRANSLATION_LOG.txt 2>&1
          echo "COMPILE_EXIT_STATUS=$?" >> TRANSLATION_LOG.txt
          exit 0
      - name: Commit translated files and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply repository translation and record diagnostics [skip ci]" || exit 0
          git push
