name: Sync curated AutoDL source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/sync-autodl-latest'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply curated AutoDL source payload
        run: python scripts/apply_autodl_sync.py

      - name: Validate Python syntax
        run: python -m compileall -q .

      - name: Validate shell scripts
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find . -type f -name '*.sh' -not -path './.git/*' -print0)

      - name: Validate JSON files
        shell: python
        run: |
          import json
          import pathlib
          for path in pathlib.Path('.').rglob('*.json'):
              if '.git' in path.parts:
                  continue
              with path.open('r', encoding='utf-8') as handle:
                  json.load(handle)

      - name: Verify English-only tracked text
        shell: python
        run: |
          import pathlib
          import re
          import subprocess

          cjk = re.compile(r'[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]')
          excluded = {
              pathlib.Path('scripts/apply_autodl_sync.py'),
              pathlib.Path('.github/workflows/autodl-source-sync.yml'),
          }
          names = subprocess.check_output(['git', 'ls-files', '-z']).decode('utf-8').split('\0')
          failures = []
          for name in names:
              if not name:
                  continue
              path = pathlib.Path(name)
              if path in excluded or not path.exists():
                  continue
              try:
                  raw = path.read_bytes()
                  if b'\x00' in raw:
                      continue
                  text = raw.decode('utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              for line_no, line in enumerate(text.splitlines(), 1):
                  if cjk.search(line):
                      failures.append(f'{path}:{line_no}:{line}')
          if failures:
              print('\n'.join(failures[:200]))
              raise SystemExit(f'{len(failures)} Chinese-containing lines remain')

      - name: Remove one-time sync infrastructure
        run: |
          rm -f scripts/apply_autodl_sync.py
          rm -rf .sync_payload
          rm -f .github/workflows/autodl-source-sync.yml

      - name: Commit synchronized source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Sync latest curated AutoDL source [skip ci]'
          git push
